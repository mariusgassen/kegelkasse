[global]
# Repo path + retention can be overridden via PGBACKREST_REPO1_* env vars
repo1-path=/pgbackrest
repo1-retention-full=7
repo1-retention-archive-type=time
repo1-retention-archive=30
log-level-file=off
log-level-stderr=info
process-max=2

[global:archive-push]
compress-level=3

[main]
pg1-path=/var/lib/postgresql/data
pg1-user=kegelkasse
pg1-database=kegelkasse
