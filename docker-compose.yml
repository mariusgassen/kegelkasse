services:
  app:
    container_name: kegelkasse_app
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose: ["8000"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      FIRST_SUPERADMIN_EMAIL: ${FIRST_SUPERADMIN_EMAIL}
      FIRST_SUPERADMIN_PASSWORD: ${FIRST_SUPERADMIN_PASSWORD}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_CLAIM_EMAIL: ${VAPID_CLAIM_EMAIL:-}
      CORS_ALLOW_ORIGIN: '${CORS_ALLOW_ORIGIN:-}'
      # pgbackrest — scheduled full backup cron + management API URL
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      PGB_MGMT_URL: ${PGB_MGMT_URL:-http://db:8089}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    container_name: kegelkasse_db
    build:
      context: docker/db
    environment:
      POSTGRES_USER: kegelkasse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: kegelkasse
      # pgbackrest retention (overrides pgbackrest.conf default of 2)
      PGBACKREST_REPO1_RETENTION_FULL: ${BACKUP_RETAIN_FULL:-2}
      # S3-compatible repo (optional — leave S3_BUCKET empty to use local volume)
      # To enable: set PGBACKREST_REPO1_TYPE=s3, PGBACKREST_REPO1_S3_BUCKET, etc.
      # See: https://pgbackrest.org/configuration.html#section-repository/option-repo-type
    command:
      - "postgres"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=pgbackrest --stanza=main archive-push %p"
      - "-c"
      - "archive_timeout=300"
      - "-c"
      - "wal_level=replica"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - pgbackrest_repo:/pgbackrest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kegelkasse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  pgbackrest_repo:
