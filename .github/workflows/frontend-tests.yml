---
name: Frontend Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        working-directory: frontend
        run: npm test -- --coverage

      - name: Write coverage to job summary
        run: |
          node -e "
          const s = require('./frontend/coverage/coverage-summary.json');
          const pct = s.total.lines.pct.toFixed(1);
          const line = '## Frontend Coverage\n\n**' + pct + '%** line coverage\n';
          require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, line);
          console.log('Coverage:', pct + '%');
          "

      - name: Generate frontend coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          node -e "
          const s = require('./frontend/coverage/coverage-summary.json');
          const pct = Math.round(s.total.lines.pct * 10) / 10;
          const label = 'frontend';
          const value = pct.toFixed(1) + '%';
          const color = pct >= 80 ? '#97ca00' : pct >= 60 ? '#dfb317' : '#e05d44';
          const charW = 65;
          const pad = 100;
          const ltl = label.length * charW;
          const vtl = value.length * charW;
          const lw = Math.floor((ltl + pad) / 10);
          const vw = Math.floor((vtl + pad) / 10);
          const w = lw + vw;
          const lc = lw * 5;
          const vc = lw * 10 + vw * 5;
          const svg = [
            \`<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"\${w}\" height=\"20\" role=\"img\" aria-label=\"\${label}: \${value}\">\`,
            \`<title>\${label}: \${value}</title>\`,
            '<linearGradient id=\"s\" x2=\"0\" y2=\"100%\"><stop offset=\"0\" stop-color=\"#bbb\" stop-opacity=\".1\"/><stop offset=\"1\" stop-opacity=\".1\"/></linearGradient>',
            \`<clipPath id=\"r\"><rect width=\"\${w}\" height=\"20\" rx=\"3\" fill=\"#fff\"/></clipPath>\`,
            '<g clip-path=\"url(#r)\">',
            \`<rect width=\"\${lw}\" height=\"20\" fill=\"#555\"/>\`,
            \`<rect x=\"\${lw}\" width=\"\${vw}\" height=\"20\" fill=\"\${color}\"/>\`,
            \`<rect width=\"\${w}\" height=\"20\" fill=\"url(#s)\"/>\`,
            '</g>',
            '<g fill=\"#fff\" text-anchor=\"middle\" font-family=\"Verdana,Geneva,DejaVu Sans,sans-serif\" text-rendering=\"geometricPrecision\" font-size=\"110\">',
            \`<text aria-hidden=\"true\" x=\"\${lc}\" y=\"150\" fill=\"#010101\" fill-opacity=\".3\" transform=\"scale(.1)\" textLength=\"\${ltl}\">\${label}</text>\`,
            \`<text x=\"\${lc}\" y=\"140\" transform=\"scale(.1)\" fill=\"#fff\" textLength=\"\${ltl}\">\${label}</text>\`,
            \`<text aria-hidden=\"true\" x=\"\${vc}\" y=\"150\" fill=\"#010101\" fill-opacity=\".3\" transform=\"scale(.1)\" textLength=\"\${vtl}\">\${value}</text>\`,
            \`<text x=\"\${vc}\" y=\"140\" transform=\"scale(.1)\" fill=\"#fff\" textLength=\"\${vtl}\">\${value}</text>\`,
            '</g></svg>'
          ].join('');
          require('fs').mkdirSync('.github/badges', {recursive: true});
          require('fs').writeFileSync('.github/badges/coverage-frontend.svg', svg);
          console.log('Badge written for', value);
          "

      - name: Commit badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage-frontend.svg
          git diff --staged --quiet || git commit -m "chore: update frontend coverage badge [skip ci]"
          git pull --rebase origin main
          git push

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-html
          path: frontend/coverage/
          retention-days: 14
