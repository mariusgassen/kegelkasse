---
name: E2E Tests (Push)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: kegelkasse
          POSTGRES_PASSWORD: kegelkassepw
          POSTGRES_DB: kegelkasse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kegelkasse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://kegelkasse:kegelkassepw@localhost:5432/kegelkasse
      SECRET_KEY: e2e-test-secret-key-min-32-chars-ok
      ENVIRONMENT: development
      FIRST_SUPERADMIN_EMAIL: admin@kegelkasse.de
      FIRST_SUPERADMIN_PASSWORD: admin123

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ── Backend ────────────────────────────────────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install backend dependencies
        working-directory: backend
        run: poetry install --no-root --only main

      - name: Run migrations
        working-directory: backend
        run: poetry run alembic upgrade head

      - name: Seed superadmin
        working-directory: backend
        run: poetry run python -m app.scripts.create_admin

      - name: Start backend
        working-directory: backend
        run: |
          poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health && break || sleep 1
          done

      # ── Frontend ───────────────────────────────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend preview server
        working-directory: frontend
        run: npm run preview -- --port 5173 &

      # ── Playwright ─────────────────────────────────────────────────────────

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E push tests
        working-directory: e2e
        run: npx playwright test push.spec.ts
        env:
          CI: "true"
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8000
          E2E_EMAIL: admin@kegelkasse.de
          E2E_PW: admin123

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
