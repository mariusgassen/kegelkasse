---
name: Backend Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (main + test group)
        working-directory: backend
        run: poetry install --no-root --with test

      - name: Run tests with coverage
        working-directory: backend
        run: |
          poetry run pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-report=html:coverage-html
        env:
          # SQLite in-memory is set inside conftest.py, but we still need
          # a non-empty DATABASE_URL to satisfy pydantic-settings validation.
          DATABASE_URL: sqlite:///./ci_test.db
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok

      - name: Write coverage to job summary
        working-directory: backend
        run: |
          poetry run python -c "
          import xml.etree.ElementTree as ET, os
          tree = ET.parse('coverage.xml')
          pct = round(float(tree.getroot().get('line-rate', 0)) * 100, 1)
          summary = f'## Backend Coverage\n\n**{pct}%** line coverage\n'
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          print(f'Coverage: {pct}%')
          "

      - name: Generate backend coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: |
          mkdir -p ../.github/badges
          poetry run genbadge coverage -t "backend" -i coverage.xml -o ../.github/badges/coverage-backend.svg

      - name: Commit badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage-backend.svg
          git diff --staged --quiet || git commit -m "chore: update backend coverage badge [skip ci]"
          git pull --rebase origin main
          git push

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-html
          path: backend/coverage-html/
          retention-days: 14
