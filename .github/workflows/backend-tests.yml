---
name: Backend Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (main + test group)
        working-directory: backend
        run: poetry install --no-root --with test

      - name: Run tests with coverage
        working-directory: backend
        run: |
          poetry run pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-report=html:coverage-html
        env:
          # SQLite in-memory is set inside conftest.py, but we still need
          # a non-empty DATABASE_URL to satisfy pydantic-settings validation.
          DATABASE_URL: sqlite:///./ci_test.db
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok

      - name: Write coverage to job summary
        working-directory: backend
        run: |
          poetry run python -c "
          import xml.etree.ElementTree as ET, os
          tree = ET.parse('coverage.xml')
          pct = round(float(tree.getroot().get('line-rate', 0)) * 100, 1)
          summary = f'## Backend Coverage\n\n**{pct}%** line coverage\n'
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          print(f'Coverage: {pct}%')
          "

      - name: Generate backend coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: |
          poetry run python -c "
          import xml.etree.ElementTree as ET, os
          tree = ET.parse('coverage.xml')
          pct = round(float(tree.getroot().get('line-rate', 0)) * 100, 1)
          label = 'backend'
          value = f'{pct:.1f}%'
          color = '#97ca00' if pct >= 80 else '#dfb317' if pct >= 60 else '#e05d44'
          char_w = 65
          pad = 100
          ltl = len(label) * char_w
          vtl = len(value) * char_w
          lw = (ltl + pad) // 10
          vw = (vtl + pad) // 10
          w = lw + vw
          lc = lw * 5
          vc = lw * 10 + vw * 5
          svg = (
              f'<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"{w}\" height=\"20\" role=\"img\" aria-label=\"{label}: {value}\">'
              f'<title>{label}: {value}</title>'
              f'<linearGradient id=\"s\" x2=\"0\" y2=\"100%\"><stop offset=\"0\" stop-color=\"#bbb\" stop-opacity=\".1\"/><stop offset=\"1\" stop-opacity=\".1\"/></linearGradient>'
              f'<clipPath id=\"r\"><rect width=\"{w}\" height=\"20\" rx=\"3\" fill=\"#fff\"/></clipPath>'
              f'<g clip-path=\"url(#r)\">'
              f'<rect width=\"{lw}\" height=\"20\" fill=\"#555\"/>'
              f'<rect x=\"{lw}\" width=\"{vw}\" height=\"20\" fill=\"{color}\"/>'
              f'<rect width=\"{w}\" height=\"20\" fill=\"url(#s)\"/>'
              f'</g>'
              f'<g fill=\"#fff\" text-anchor=\"middle\" font-family=\"Verdana,Geneva,DejaVu Sans,sans-serif\" text-rendering=\"geometricPrecision\" font-size=\"110\">'
              f'<text aria-hidden=\"true\" x=\"{lc}\" y=\"150\" fill=\"#010101\" fill-opacity=\".3\" transform=\"scale(.1)\" textLength=\"{ltl}\">{label}</text>'
              f'<text x=\"{lc}\" y=\"140\" transform=\"scale(.1)\" fill=\"#fff\" textLength=\"{ltl}\">{label}</text>'
              f'<text aria-hidden=\"true\" x=\"{vc}\" y=\"150\" fill=\"#010101\" fill-opacity=\".3\" transform=\"scale(.1)\" textLength=\"{vtl}\">{value}</text>'
              f'<text x=\"{vc}\" y=\"140\" transform=\"scale(.1)\" fill=\"#fff\" textLength=\"{vtl}\">{value}</text>'
              f'</g></svg>'
          )
          os.makedirs('../.github/badges', exist_ok=True)
          with open('../.github/badges/coverage-backend.svg', 'w') as f:
              f.write(svg)
          print(f'Badge written for {value}')
          "

      - name: Commit badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage-backend.svg
          git diff --staged --quiet || git commit -m "chore: update backend coverage badge [skip ci]"
          git pull --rebase origin main
          git push

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-html
          path: backend/coverage-html/
          retention-days: 14
