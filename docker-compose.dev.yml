services:
  app:
    container_name: kegelkasse_app_dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://kegelkasse:changeme@db:5432/kegelkasse
      SECRET_KEY: dev-secret-not-for-production-min-32-chars-ok
      ENVIRONMENT: development
      FIRST_SUPERADMIN_EMAIL: admin@kegelkasse.de
      FIRST_SUPERADMIN_PASSWORD: admin123
      BACKUP_SCHEDULE: ""
      PGB_MGMT_URL: http://db:8089
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend/src:/app/static
      - ./backend/docs_static:/app/docs_static:ro
      - club_uploads_dev:/app/uploads
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  db:
    container_name: kegelkasse_db_dev
    build:
      context: docker/db
    environment:
      POSTGRES_USER: kegelkasse
      POSTGRES_PASSWORD: kegelkassepw
      POSTGRES_DB: kegelkasse
      PGBACKREST_REPO1_RETENTION_FULL: "2"
    command:
      - "postgres"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=env -u PGBACKREST_MGMT_URL -u PGB_MGMT_URL pgbackrest --stanza=main archive-push %p"
      - "-c"
      - "archive_timeout=300"
      - "-c"
      - "wal_level=replica"
    ports: ["5432:5432"]
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - pgbackrest_dev_repo:/pgbackrest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kegelkasse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
  pgbackrest_dev_repo:
  club_uploads_dev:
