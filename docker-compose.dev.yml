services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://kegelkasse:changeme@db:5432/kegelkasse
      SECRET_KEY: dev-secret-not-for-production-min-32-chars-ok
      ENVIRONMENT: development
      FIRST_SUPERADMIN_EMAIL: admin@kegelkasse.de
      FIRST_SUPERADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend/src:/app/static
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: kegelkasse
      POSTGRES_PASSWORD: kegelkassepw
      POSTGRES_DB: kegelkasse
    ports: ["5432:5432"]
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kegelkasse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
